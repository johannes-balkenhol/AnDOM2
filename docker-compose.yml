services:
  andom2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: andom2
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./docs:/app/docs:ro
    environment:
      - ANDOM_OUTPUT_DIR=/app/output
      - ANDOM_ENV=production
    mem_limit: 12g
    cpus: "4"
