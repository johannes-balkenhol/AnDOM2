services:
  andom:
    build: .
    container_name: andom2
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Code — mounted live so changes only need docker compose restart
      - ./app.py:/app/app.py:ro
      - ./config.py:/app/config.py:ro
      - ./src:/app/src:ro
      - ./docs:/app/docs:ro
      # Data — large, downloaded separately, never baked into image
      - ./data:/data:ro
      # Output — writable, persists across restarts
      - ./output:/output
    environment:
      - ANDOM_DATA_DIR=/data
      - ANDOM_OUTPUT_DIR=/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
