# Nginx config for AnDOM 2.0 — prod + dev subdomains
# Place in /etc/nginx/sites-available/andom2
# Then: ln -s /etc/nginx/sites-available/andom2 /etc/nginx/sites-enabled/
# Then: certbot --nginx -d andom2.bioinfo-wuerz.eu -d dev.andom2.bioinfo-wuerz.eu
# Then: nginx -t && systemctl reload nginx

# ── Production: andom2.bioinfo-wuerz.eu ──────────────────────────────────────
server {
    listen 80;
    server_name andom2.bioinfo-wuerz.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name andom2.bioinfo-wuerz.eu;

    # SSL managed by certbot
    ssl_certificate     /etc/letsencrypt/live/andom2.bioinfo-wuerz.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andom2.bioinfo-wuerz.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Streamlit needs these headers for WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:8501;
    }
}

# ── Development: dev.andom2.bioinfo-wuerz.eu ─────────────────────────────────
server {
    listen 80;
    server_name dev.andom2.bioinfo-wuerz.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.andom2.bioinfo-wuerz.eu;

    ssl_certificate     /etc/letsencrypt/live/andom2.bioinfo-wuerz.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andom2.bioinfo-wuerz.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 300s;

    # Optional: restrict dev to lab IPs only
    # allow 132.187.0.0/16;  # Uni Wuerzburg
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:8502;
    }
}
