# nginx reverse proxy config for AnDOM 2.0
# Place behind nginx if you want HTTPS / custom domain
# e.g. https://andom.bioinf.uni-wuerzburg.de

server {
    listen 80;
    server_name andom.bioinf.uni-wuerzburg.de;

    # redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name andom.bioinf.uni-wuerzburg.de;

    ssl_certificate     /etc/letsencrypt/live/andom.bioinf.uni-wuerzburg.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andom.bioinf.uni-wuerzburg.de/privkey.pem;

    location / {
        proxy_pass         http://localhost:8501;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
